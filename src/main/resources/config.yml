# Tab List (Header/Footer & Player Names)
tablist:
  # Enable tab list header/footer and custom player names
  enabled: false
  # Update interval (ticks, 20 = 1 second)
  update-interval: 20
  # Header format (supports PlaceholderAPI placeholders)
  # Placeholders: {player}, {online}, {max}, {map}, {state}, {players}, {max-players}
  header: "&6&lL-BedWars\n&7{player}"
  # Footer format
  footer: "&7Online: &a{online}&7/&a{max}"
  # Player name format in tab list (set to "" to disable custom names)
  # {player} = raw name, {display-name} = vanilla display name
  # {team-color} = team color (only in arena), {ping} = player ping
  # PlaceholderAPI placeholders also work: %luckperms_prefix%, %vault_prefix%, etc.
  player-name-format: "{team-color}{player}"
  # Sort players by team color in tab list (same team players appear grouped together)
  sort-by-team: true

# Chat Settings
# Note: PlaceholderAPI placeholders can be used in format strings.
# e.g. "%luckperms_prefix%{player}&f: {message}" or "%vault_prefix%{player}&f: {message}"
chat:
  enabled: true
  global-prefix: "!"
  team-format: "{player}&f: {message}"
  global-format: "&a[G] {player}&f: {message}"
  waiting-format: "&7[Lobby] {player}&f: {message}"

# Leaderboard
leaderboard:
  enabled: true
  update-interval: 60
  size: 10

# Cosmetics
cosmetics:
  # Where trail effects work: ALL (all worlds), ARENA (arenas only)
  trail-mode: ARENA

