  setup-guide: "&6&l=== L-BEDWARS ARENA SETUP GUIDE ===\n&7Step 1: &eSelect Arena Region\n&7  Use the &eBlaze Rod&7 to mark 2 corners:\n&7  &eLeft Click&7: Corner 1 | &eRight Click&7: Corner 2\n&7  Then: &e/setup setregion\n\n&7Step 2: &eSet Game Mode\n&7  &e/bwa setmode {arena} <solo|duo|trio|quad>\n\n&7Step 3: &eAdd Teams\n&7  &e/bwa addteam {arena} <name> <color> <max-players>\n&7  Example: &e/bwa addteam {arena} Red RED 4\n&7  Colors: RED, BLUE, GREEN, YELLOW, AQUA, WHITE, BLACK, GOLD, DARK_RED, DARK_BLUE, DARK_GREEN, LIGHT_PURPLE\n\n&7Step 4: &eSet Team Spawns\n&7  Stand at the team's spawn point, then:\n&7  &e/setup setspawn <team>\n\n&7Step 5: &eSet Team Beds\n&7  Look at the team's bed, then:\n&7  &e/setup setbed <team>\n\n&7Step 6: &eAdd Generators\n&7  &e/setup setgenerator <type>\n&7  Types: IRON, GOLD, DIAMOND, EMERALD\n\n&7Step 7: &eAdd NPCs\n&7  &e/setup setshop&7 - Shop NPC\n&7  &e/setup setupgrade&7 - Upgrade NPC\n\n&7Step 8: &eLobby & Spectator Locations\n&7  &e/bwa setlobby {arena}&7 - Waiting lobby spawn\n&7  &e/bwa setspectator {arena}&7 - Spectator spawn\n&7  &e/bwa setmainlobby&7 - Post-game teleport point\n\n&7Step 9: &eFinish & Enable\n&7  &e/setup done&7 - Complete and save setup\n&7  &e/bwa enable {arena}&7 - Activate the arena"
  main-lobby-set: "&aMain lobby location set! &7Players will be teleported here after the game."
