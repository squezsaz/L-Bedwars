  setup-guide: "&6&l=== L-BEDWARS ARENA KURULUM REHBERİ ===\n&7Adım 1: &eArena Bölgesini Seç\n&7  &eAteş Çubuğu&7 ile 2 köşeyi işaretle:\n&7  &eSol Tık&7: Köşe 1 | &eSağ Tık&7: Köşe 2\n&7  Ardından: &e/setup setregion\n\n&7Adım 2: &eOyun Modu Belirle\n&7  &e/bwa setmode {arena} <solo|duo|trio|quad>\n\n&7Adım 3: &eTakımları Ekle\n&7  &e/bwa addteam {arena} <isim> <renk> <max-oyuncu>\n&7  Örnek: &e/bwa addteam {arena} Kirmizi RED 4\n&7  Renkler: RED, BLUE, GREEN, YELLOW, AQUA, WHITE, BLACK, GOLD, DARK_RED, DARK_BLUE, DARK_GREEN, LIGHT_PURPLE\n\n&7Adım 4: &eTakım Spawn'larını Ayarla\n&7  Takımın spawn noktasında dur ve:\n&7  &e/setup setspawn <takım>\n\n&7Adım 5: &eTakım Yataklarını Ayarla\n&7  Yatağa bak ve:\n&7  &e/setup setbed <takım>\n\n&7Adım 6: &eGenerator Ekle\n&7  &e/setup setgenerator <tip>\n&7  Tipler: IRON, GOLD, DIAMOND, EMERALD\n\n&7Adım 7: &eNPC'leri Ekle\n&7  &e/setup setshop&7 - Mağaza NPC'si\n&7  &e/setup setupgrade&7 - Yükseltme NPC'si\n\n&7Adım 8: &eLobi & İzleyici Konumları\n&7  &e/bwa setlobby {arena}&7 - Bekleme odası spawn'ı\n&7  &e/bwa setspectator {arena}&7 - İzleyici spawn'ı\n&7  &e/bwa setmainlobby&7 - Maç sonu ışınlanma noktası\n\n&7Adım 9: &eBitir ve Aktif Et\n&7  &e/setup done&7 - Kurulumu tamamla ve kaydet\n&7  &e/bwa enable {arena}&7 - Arenayı aktif et"
